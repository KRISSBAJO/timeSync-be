services:
  postgres:
    image: postgres:16-alpine
    container_name: timesync-hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timesync
      POSTGRES_PASSWORD: timesync_dev_password
      POSTGRES_DB: timesync_hr
    ports:
      - "55432:5432"
    volumes:
      - timesync_hr_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesync -d timesync_hr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timesync-hr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - timesync_hr_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timesync_hr_postgres:
  timesync_hr_redis:
